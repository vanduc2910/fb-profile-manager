<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>FB Profile Manager</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background-color: #f4f4f4;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }
        .header {
            flex-grow: 1;
            background-color: #3b5998;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .profile-list {
            padding: 15px;
            flex-grow: 2;
            background-color: #ffffff;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }
        .profile-item {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Sidebar</h2>
        <ul>
            <li>Dashboard</li>
            <li>Profiles</li>
            <li>Settings</li>
            <li>Logout</li>
        </ul>
    </div>
    <div class="header">
        <h1>Facebook Profile Manager</h1>
    </div>
    <div class="profile-list">
        <h2>Profile List</h2>
        <div class="profile-item">Profile 1</div>
        <div class="profile-item">Profile 2</div>
        <div class="profile-item">Profile 3</div>
    </div>
</body>
</html>
